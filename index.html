<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #74ebe1 0%, #d4a5ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .profile-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            padding: 30px;
            text-align: center;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #f0f0f0;
            margin-bottom: 20px;
        }

        .name {
            font-size: 24px;
            color: #333;
            margin-bottom: 5px;
        }

        .title {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .bio {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-btn {
            display: block;
            padding: 12px;
            background: #f8f9fa;
            color: #333;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid #e0e0e0;
        }

        .link-btn:hover {
            background: #333;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="https://via.placeholder.com/150" alt="Foto de Perfil" class="profile-img">
        
        <h1 class="name">Seu Nome Aqui</h1>
        <p class="title">Sua Profissão / O que você faz</p>
        
        <p class="bio">
            Uma breve descrição sobre você. Conte um pouco sobre suas habilidades, paixões, projetos atuais ou o que você está estudando no momento.
        </p>
        
        <div class="links">
            <a href="https://linkedin.com/in/seu-usuario" target="_blank" class="link-btn">LinkedIn</a>
            <a href="https://github.com/seu-usuario" target="_blank" class="link-btn">GitHub</a>
            <a href="https://instagram.com/seu-usuario" target="_blank" class="link-btn">Instagram</a>
            <a href="mailto:seu-email@email.com" class="link-btn">Contato por E-mail</a>
        </div>
    </div>

</body>
</html>
